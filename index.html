<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ปฏิทินเวร</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.8/index.global.min.js"></script>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>📅 ปฏิทินเวร</h1>
      <p>คลิกที่วันเพื่อเพิ่มเวร • คลิกที่เวรเพื่อลบ</p>
    </div>

    <div id="calendar"></div>

    <div class="summary-btn-container">
      <button id="summaryBtn">📊 สรุปเวรทั้งหมด</button>
      <button id="resetMonthBtn">♻️ รีเซ็ตเดือนนี้</button>
      <button id="sendToN8nBtn">🚀 ส่งเวรเดือนนี้</button>
    </div>
  </div>

  <div id="shiftModal" class="modal">
    <div class="modal-content">
      <h3>✨ เลือกเวร</h3>

      <p>🏥 ตึก</p>
      <div id="buildingBtns" class="btn-group">
        <button data-building="C">ตึก C</button>
        <button data-building="N">ตึก N</button>
      </div>

      <p>⏰ เวร</p>
      <div id="shiftBtns" class="btn-group">
        <button data-shift="7">7</button>
        <button data-shift="12">12</button>
        <button data-shift="24">24</button>
        <button data-shift="PL">PL</button>
        <button data-shift="VL">VL</button>
      </div>

      <div class="modal-actions">
        <button id="cancelBtn">ยกเลิก</button>
        <button id="confirmBtn">✓ ตกลง</button>
      </div>
    </div>
  </div>

  <div id="summaryModal" class="modal">
    <div class="modal-content">
      <h3>📋 สรุปเวรทั้งหมด</h3>
      <ul id="summaryList"></ul>
      <div style="text-align:right;">
        <button id="closeSummary">ปิด</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
